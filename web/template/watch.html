<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>{{ template_ne }} | {{ file_name }}</title>
  <link rel="icon" href="https://telegra.ph/file/5a53e66bb148003666d62.jpg" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Fonts & Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Plyr & Bootstrap -->
  <link rel="stylesheet" href="https://cdn.plyr.io/3.6.12/plyr.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    :root {
      --primary-color: #00f0ff;
      --secondary-color: #7000ff;
      --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: 1px solid rgba(255, 255, 255, 0.1);
      --card-radius: 16px;
    }

    body {
      background: var(--bg-gradient);
      color: #fff;
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .navbar {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .navbar-brand {
      color: var(--primary-color) !important;
      font-weight: 600;
    }

    /* Player */
    .player-wrapper {
      background: #000;
      border-radius: var(--card-radius);
      overflow: hidden;
      margin-top: 20px;
      border: var(--glass-border);
    }

    /* Buttons */
    .btn-custom {
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-weight: 500;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    .btn-mx { background: linear-gradient(45deg, #2980b9, #2c3e50); color: white; }
    .btn-vlc { background: linear-gradient(45deg, #e67e22, #d35400); color: white; }
    .btn-playit { background: linear-gradient(45deg, #8e44ad, #9b59b6); color: white; }

    .btn-download { background: linear-gradient(45deg, #00b09b, #96c93d); color: white; width: 100%; }
    .btn-telegram { background: linear-gradient(45deg, #0088cc, #36aee2); color: white; width: 100%; }

    /* Cards */
    .glass-card {
      background: var(--glass-bg);
      border: var(--glass-border);
      border-radius: var(--card-radius);
      padding: 20px;
      margin-bottom: 20px;
    }

    .file-info-title {
      color: var(--primary-color);
      margin-bottom: 10px;
    }

    .info-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .info-label { color: #888; }

    /* ✅ FIX: filename inside box */
    .info-value {
      word-break: break-all;
      white-space: normal;
      max-width: 100%;
      font-family: monospace;
    }

    footer {
      margin-top: auto;
      text-align: center;
      padding: 10px;
      color: #666;
    }
  </style>
</head>

<body>

  <nav class="navbar navbar-dark">
    <div class="container">
      <span class="navbar-brand">{{ template_ne }}</span>
    </div>
  </nav>

  <main class="container py-4">

    <!-- Player -->
    <div class="player-wrapper mb-4">
      <video id="myVideo" src="{{file_url}}" class="w-100" controls></video>
    </div>

    <!-- ✅ VLC INFO MESSAGE -->
    <div class="text-center mt-2" style="font-size: 0.8rem; color: #aaa;">
      ⚠️ Some video/audio formats may not play in web player.<br>
      For full support, use <b>VLC Player</b> (supports all video & audio formats).
    </div>

    <!-- Players -->
    <div class="d-flex gap-2 my-3">
      <a onclick="mx_player()" class="btn btn-custom btn-mx flex-fill">MX Player</a>
      <a onclick="vlc_player()" class="btn btn-custom btn-vlc flex-fill">VLC Player</a>
      <a onclick="playit_player()" class="btn btn-custom btn-playit flex-fill">PlayIt</a>
    </div>

    <!-- Actions -->
    <div class="row g-3 mb-3">
      <div class="col-md-6">
        <a onclick="streamDownload()" class="btn btn-custom btn-download">Download</a>
      </div>
      <div class="col-md-6">
        <a onclick="showLinkModal('{{tg_button}}')" class="btn btn-custom btn-telegram">Telegram</a>
      </div>
    </div>

    <!-- File Info -->
    <div class="glass-card">
      <div class="file-info-title">File Details</div>
      <div class="info-item">
        <span class="info-label">Filename</span>
        <span class="info-value">{{file_name}}</span>
      </div>
      <div class="info-item">
        <span class="info-label">Size</span>
        <span class="info-value">{{file_size}}</span>
      </div>
    </div>

  </main>

  <footer>
    © 2025 {{ template_ne }}
  </footer>

  <script>
    function mx_player() {
      let url = "{{ file_url }}";
      window.location.href = `intent:${url}#Intent;package=com.mxtech.videoplayer.ad;end`;
    }

    function vlc_player() {
      let url = "{{ file_url }}";
      window.location.href = `intent:${url}#Intent;package=org.videolan.vlc;end`;
    }

    function playit_player() {
      let url = "{{ file_url }}";
      window.location.href = `intent:${url}#Intent;package=com.playit.videoplayer;end`;
    }

    function streamDownload() {
      window.open("{{ file_url }}", "_blank");
    }

    function showLinkModal(url) {
      if (url) window.open(url, "_blank");
    }
  </script>

</body>
</html>
