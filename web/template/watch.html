<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>{{ file_name }} | GOFLIX</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;600;700;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --cyan:#00f0ff;
  --purple:#7000ff;
  --red:#ff0844;
  --green:#00c853;
  --bg:#07070e;
  --glass:rgba(255,255,255,0.05);
  --border:rgba(255,255,255,0.1);
  --ctrl-h:72px;
}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:var(--bg);
  font-family:'Outfit',sans-serif;
  color:#fff;
  cursor:none;
}

/* ═══════════════════════════════
   CUSTOM CURSOR + TRAIL
═══════════════════════════════ */
#gf-cursor{
  position:fixed;width:11px;height:11px;
  border-radius:50%;background:#fff;
  pointer-events:none;z-index:999999;
  transform:translate(-50%,-50%);
  transition:width .12s,height .12s;
  mix-blend-mode:difference;
}
#gf-cursor.clicking{width:7px;height:7px;}
#trail-wrap{position:fixed;inset:0;pointer-events:none;z-index:999998;}
.tdot{
  position:absolute;border-radius:50%;
  pointer-events:none;
  transform:translate(-50%,-50%);
  transition:opacity .3s;
}

/* ═══════════════════════════════
   INTRO SCREEN
═══════════════════════════════ */
#intro{
  position:fixed;inset:0;
  background:#000;
  display:flex;align-items:center;justify-content:center;
  z-index:99990;
  overflow:hidden;
}
#intro-stage{
  position:relative;
  display:flex;align-items:center;
  height:110px;
}

/* X character */
#x-wrap{
  position:absolute;
  left:-160px;
  display:flex;flex-direction:column;align-items:center;
  animation:xSlide 2.4s cubic-bezier(.22,.68,0,1.2) .4s forwards;
}
@keyframes xSlide{
  0%  {left:-160px;opacity:0;}
  10% {opacity:1;}
  65% {left:4px;}
  75% {left:-3px;}
  85% {left:2px;}
  100%{left:0px;}
}
#x-letter{
  font-size:96px;font-weight:900;font-style:italic;
  color:#fff;line-height:1;letter-spacing:-4px;
  text-shadow:0 0 40px rgba(255,255,255,.25);
  animation:xBob 0.38s ease-in-out .4s infinite;
}
@keyframes xBob{
  0%,100%{transform:translateY(0) rotate(-1deg);}
  50%{transform:translateY(-4px) rotate(1deg);}
}
#legs{
  display:flex;gap:22px;margin-top:2px;
  animation:xSlide 2.4s cubic-bezier(.22,.68,0,1.2) .4s forwards;
  position:absolute;left:-160px;bottom:-14px;
}
.leg{
  width:7px;height:20px;background:#fff;border-radius:4px;
  transform-origin:top center;
}
.leg-l{animation:legSwL .34s ease-in-out .4s infinite;}
.leg-r{animation:legSwR .34s ease-in-out .4s infinite;}
@keyframes legSwL{0%,100%{transform:rotate(22deg);}50%{transform:rotate(-22deg);}}
@keyframes legSwR{0%,100%{transform:rotate(-22deg);}50%{transform:rotate(22deg);}}

/* GOFLIX letters */
#gf-text{
  display:flex;align-items:center;
  opacity:0;
  animation:textShow .01s 2.7s forwards;
}
@keyframes textShow{to{opacity:1;}}
.gfl{
  font-size:96px;font-weight:900;font-style:italic;
  background:linear-gradient(135deg,var(--cyan) 0%,#a040ff 50%,var(--purple) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  display:inline-block;
  opacity:0;transform:translateY(110px) scaleX(.8);
}
.gfl:nth-child(1){animation:lUp .55s cubic-bezier(.34,1.56,.64,1) 2.7s  forwards;}
.gfl:nth-child(2){animation:lUp .55s cubic-bezier(.34,1.56,.64,1) 2.82s forwards;}
.gfl:nth-child(3){animation:lUp .55s cubic-bezier(.34,1.56,.64,1) 2.94s forwards;}
.gfl:nth-child(4){animation:lUp .55s cubic-bezier(.34,1.56,.64,1) 3.06s forwards;}
.gfl:nth-child(5){animation:lUp .55s cubic-bezier(.34,1.56,.64,1) 3.18s forwards;}
.gfl:nth-child(6){animation:lUp .55s cubic-bezier(.34,1.56,.64,1) 3.30s forwards;}
@keyframes lUp{to{opacity:1;transform:translateY(0) scaleX(1);}}

#logo-dot{
  width:15px;height:15px;border-radius:50%;
  background:radial-gradient(circle,#ff4060,#ff0844);
  box-shadow:0 0 16px rgba(255,8,68,.9),0 0 32px rgba(255,8,68,.4);
  margin-left:4px;margin-bottom:52px;flex-shrink:0;
  opacity:0;transform:scale(0);
  animation:dotIn .45s cubic-bezier(.34,1.56,.64,1) 3.6s forwards;
}
@keyframes dotIn{to{opacity:1;transform:scale(1);}}

#intro-tagline{
  position:absolute;bottom:-32px;left:50%;transform:translateX(-50%);
  font-size:13px;font-weight:300;letter-spacing:6px;
  color:rgba(255,255,255,.35);white-space:nowrap;
  opacity:0;
  animation:tagIn .6s ease 3.8s forwards;
}
@keyframes tagIn{to{opacity:1;}}

/* ═══════════════════════════════
   PLAYER WRAPPER
═══════════════════════════════ */
#player{
  position:fixed;inset:0;
  display:none;flex-direction:column;
  background:#000;
}
#player.on{display:flex;}

/* VIDEO AREA */
#vid-wrap{
  position:relative;flex:1;overflow:hidden;background:#000;
}
#vid-el{
  width:100%;height:100%;object-fit:contain;display:block;
}

/* Brightness overlay */
#bright-overlay{
  position:absolute;inset:0;background:#000;
  opacity:0;pointer-events:none;z-index:4;
  transition:opacity .05s;
}

/* Play pulse */
#play-pulse{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  width:80px;height:80px;border-radius:50%;
  background:rgba(0,240,255,.15);
  border:2px solid rgba(0,240,255,.5);
  display:flex;align-items:center;justify-content:center;
  font-size:30px;z-index:10;pointer-events:none;
  opacity:0;transition:opacity .15s;
}
#play-pulse.pop{
  animation:pulsePop .55s ease forwards;
}
@keyframes pulsePop{
  0%{transform:translate(-50%,-50%) scale(0);opacity:1;}
  60%{transform:translate(-50%,-50%) scale(1.1);opacity:1;}
  100%{transform:translate(-50%,-50%) scale(1.4);opacity:0;}
}

/* ── TOP BAR ── */
#top-bar{
  position:absolute;top:0;left:0;right:0;
  padding:14px 20px 40px;
  background:linear-gradient(180deg,rgba(0,0,0,.82) 0%,transparent 100%);
  display:flex;align-items:flex-start;justify-content:space-between;
  z-index:30;
  transition:opacity .4s,visibility .4s;
}
#top-bar.hide{opacity:0;visibility:hidden;}

#top-title{
  font-size:15px;font-weight:600;
  color:rgba(255,255,255,.92);
  max-width:55%;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;
  text-shadow:0 1px 8px rgba(0,0,0,.8);
}
#top-right{display:flex;gap:10px;align-items:center;flex-shrink:0;}

.tpbtn{
  position:relative;
  background:rgba(10,8,20,.65);
  border:1px solid rgba(255,255,255,.14);
  color:#fff;
  padding:7px 16px;border-radius:22px;
  cursor:pointer;font-size:12px;
  font-family:'Outfit',sans-serif;font-weight:400;
  display:flex;align-items:center;gap:7px;
  white-space:nowrap;
  backdrop-filter:blur(10px);
  transition:background .2s,border-color .2s;
  max-width:170px;
}
.tpbtn:hover{background:rgba(0,240,255,.12);border-color:rgba(0,240,255,.4);}
.tpbtn-icon{font-size:14px;flex-shrink:0;line-height:1;}
.tpbtn-lbl{
  overflow:hidden;text-overflow:ellipsis;
  white-space:nowrap;max-width:110px;
  display:block;
}

/* POPUP PANELS */
.ppanel{
  position:absolute;top:calc(100% + 8px);right:0;
  min-width:210px;
  background:rgba(9,7,22,.96);
  border:1px solid rgba(255,255,255,.12);
  border-radius:14px;padding:10px 8px;
  z-index:60;
  display:none;
  backdrop-filter:blur(20px);
  box-shadow:0 12px 40px rgba(0,0,0,.6);
}
.ppanel.open{display:block;}
.pp-title{
  font-size:10px;color:rgba(255,255,255,.35);
  text-transform:uppercase;letter-spacing:1.2px;
  padding:4px 10px 8px;
}
.pp-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:8px;
  cursor:pointer;font-size:13px;color:rgba(255,255,255,.8);
  transition:background .15s,color .15s;
}
.pp-item:hover{background:rgba(255,255,255,.08);}
.pp-item.sel{background:rgba(0,240,255,.1);color:var(--cyan);}
.pp-dot{
  width:8px;height:8px;border-radius:50%;
  background:rgba(255,255,255,.25);flex-shrink:0;
}
.pp-item.sel .pp-dot{background:var(--cyan);box-shadow:0 0 6px var(--cyan);}

/* ── BOTTOM CONTROLS ── */
#ctrl-bar{
  position:absolute;bottom:0;left:0;right:0;
  padding:0 18px 16px;
  background:linear-gradient(0deg,rgba(0,0,0,.88) 0%,transparent 100%);
  z-index:30;
  transition:opacity .4s,visibility .4s;
}
#ctrl-bar.hide{opacity:0;visibility:hidden;}

/* PROGRESS + WAVEFORM */
#prog-outer{
  position:relative;height:44px;
  display:flex;align-items:center;
  cursor:pointer;margin-bottom:2px;
}
#wave-canvas{
  position:absolute;bottom:16px;left:0;
  width:100%;height:30px;
  pointer-events:none;opacity:.45;
}
#prog-track{
  width:100%;height:4px;background:rgba(255,255,255,.18);
  border-radius:4px;position:relative;overflow:visible;
}
#prog-buf{
  position:absolute;inset:0;
  background:rgba(255,255,255,.28);border-radius:4px;width:0%;
}
#prog-fill{
  position:absolute;inset:0;
  background:linear-gradient(90deg,var(--cyan),#9040ff,var(--purple));
  border-radius:4px;width:0%;
}
#prog-thumb{
  position:absolute;top:50%;
  width:15px;height:15px;border-radius:50%;
  background:#fff;left:0%;
  transform:translate(-50%,-50%);
  box-shadow:0 0 10px rgba(0,240,255,.7),0 0 20px rgba(0,240,255,.3);
  pointer-events:none;
  transition:transform .1s;
}
#prog-outer:hover #prog-thumb{transform:translate(-50%,-50%) scale(1.3);}

/* TOOLTIP time */
#prog-tip{
  position:absolute;bottom:calc(100% + 8px);
  background:rgba(0,0,0,.85);border:1px solid rgba(255,255,255,.15);
  color:#fff;font-size:11px;padding:3px 8px;border-radius:6px;
  pointer-events:none;display:none;white-space:nowrap;
  transform:translateX(-50%);
}

/* BTN ROW */
#btn-row{
  display:flex;align-items:center;gap:10px;
}
.cbtn{
  background:none;border:none;color:#fff;
  cursor:pointer;padding:7px;border-radius:9px;
  font-size:18px;line-height:1;
  display:flex;align-items:center;justify-content:center;
  transition:background .18s,color .18s,transform .12s;
}
.cbtn:hover{background:rgba(255,255,255,.1);color:var(--cyan);}
.cbtn:active{transform:scale(.88);}
#time-lbl{
  font-size:13px;color:rgba(255,255,255,.75);
  white-space:nowrap;margin-left:2px;
  font-variant-numeric:tabular-nums;
}
.spacer{flex:1;}

/* VLC VERTICAL SLIDERS in bottom bar */
.vlc-grp{
  display:flex;flex-direction:column;
  align-items:center;gap:3px;
}
.vlc-lbl{
  font-size:10px;color:rgba(255,255,255,.45);
  white-space:nowrap;letter-spacing:.4px;
}
.vlc-wrap{
  position:relative;
  display:flex;align-items:center;justify-content:center;
  cursor:ns-resize;user-select:none;
}
.vlc-track{
  width:5px;background:rgba(255,255,255,.18);
  border-radius:4px;position:relative;overflow:hidden;
}
.vlc-fill{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(to top,var(--cyan),var(--purple));
  border-radius:4px;
}
.vlc-knob{
  position:absolute;left:50%;
  width:14px;height:14px;border-radius:50%;
  background:#fff;
  transform:translate(-50%,50%);
  box-shadow:0 0 8px rgba(0,240,255,.5);
  pointer-events:none;
}

/* FULLSCREEN SIDE SLIDERS */
#fs-sliders{
  position:absolute;right:22px;top:50%;
  transform:translateY(-50%);
  display:flex;gap:18px;align-items:flex-end;
  z-index:32;
  opacity:0;visibility:hidden;
  transition:opacity .35s,visibility .35s;
}
#fs-sliders.on{opacity:1;visibility:visible;}
#fs-sliders.hide{opacity:0;}
.fs-grp{display:flex;flex-direction:column;align-items:center;gap:8px;}
.fs-lbl{font-size:10px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px;}
.fs-val{font-size:11px;color:rgba(255,255,255,.65);text-align:center;}

/* SKIP INDICATOR */
.skip-ind{
  position:absolute;top:50%;
  background:rgba(0,0,0,.55);
  border:1px solid rgba(255,255,255,.15);
  border-radius:12px;padding:10px 18px;
  font-size:14px;font-weight:600;
  transform:translateY(-50%);
  opacity:0;pointer-events:none;z-index:20;
  backdrop-filter:blur(8px);
  transition:opacity .2s;
}
#skip-back{left:60px;}
#skip-fwd{right:60px;}
.skip-ind.show{opacity:1;}

/* WATERMARK */
#wm{
  position:absolute;bottom:90px;right:24px;
  font-size:13px;font-weight:700;letter-spacing:3px;
  color:rgba(255,255,255,.08);
  pointer-events:none;z-index:5;
  transform:rotate(-15deg);
  user-select:none;
}
</style>
</head>
<body>

<!-- CURSOR -->
<div id="gf-cursor"></div>
<div id="trail-wrap"></div>

<!-- ═══════════ INTRO ═══════════ -->
<div id="intro">
  <div id="intro-stage">

    <div id="x-wrap">
      <div id="x-letter">X</div>
    </div>
    <div id="legs">
      <div class="leg leg-l"></div>
      <div class="leg leg-r"></div>
    </div>

    <div id="gf-text">
      <span class="gfl">G</span>
      <span class="gfl">O</span>
      <span class="gfl">F</span>
      <span class="gfl">L</span>
      <span class="gfl">I</span>
      <span class="gfl">X</span>
      <div id="logo-dot"></div>
    </div>

    <div id="intro-tagline">CINEMA IN YOUR BROWSER</div>
  </div>
</div>

<!-- ═══════════ PLAYER ═══════════ -->
<div id="player">
  <div id="vid-wrap">

    <div id="bright-overlay"></div>

    <video id="vid-el"
      src="{{ file_url }}"
      preload="metadata"
      oncontextmenu="return false;">
      <track id="sub-track" kind="subtitles" srclang="en" default/>
    </video>

    <div id="play-pulse"></div>
    <div id="wm">GOFLIX</div>

    <!-- SKIP INDICATORS -->
    <div class="skip-ind" id="skip-back">⏪ 10s</div>
    <div class="skip-ind" id="skip-fwd">10s ⏩</div>

    <!-- ── TOP BAR ── -->
    <div id="top-bar">
      <div id="top-title">{{ file_name }}</div>
      <div id="top-right">

        <!-- AUDIO -->
        <div style="position:relative;">
          <button class="tpbtn" id="aud-btn" onclick="togglePanel('aud-panel',this)">
            <span class="tpbtn-icon">🔊</span>
            <span class="tpbtn-lbl" id="aud-lbl">Default Audio</span>
          </button>
          <div class="ppanel" id="aud-panel">
            <div class="pp-title">Audio Track</div>
            <div class="pp-item sel" onclick="pickAudio(this,'Default Audio')"><div class="pp-dot"></div>Default Audio</div>
            <div class="pp-item" onclick="pickAudio(this,'English 5.1')"><div class="pp-dot"></div>English 5.1</div>
            <div class="pp-item" onclick="pickAudio(this,'Hindi')"><div class="pp-dot"></div>Hindi</div>
            <div class="pp-item" onclick="pickAudio(this,'Tamil')"><div class="pp-dot"></div>Tamil</div>
            <div class="pp-item" onclick="pickAudio(this,'Telugu')"><div class="pp-dot"></div>Telugu</div>
          </div>
        </div>

        <!-- SUBTITLE -->
        <div style="position:relative;">
          <button class="tpbtn" id="sub-btn" onclick="togglePanel('sub-panel',this)">
            <span class="tpbtn-icon">💬</span>
            <span class="tpbtn-lbl" id="sub-lbl">No Subtitle</span>
          </button>
          <div class="ppanel" id="sub-panel">
            <div class="pp-title">Subtitle</div>
            <div class="pp-item sel" onclick="pickSub(this,'No Subtitle','')"><div class="pp-dot"></div>No Subtitle</div>
            <div class="pp-item" onclick="pickSub(this,'English','')"><div class="pp-dot"></div>English</div>
            <div class="pp-item" onclick="pickSub(this,'Hindi','')"><div class="pp-dot"></div>Hindi</div>
            <div class="pp-item" onclick="pickSub(this,'Tamil','')"><div class="pp-dot"></div>Tamil</div>
          </div>
        </div>

      </div>
    </div>

    <!-- FULLSCREEN SIDE SLIDERS -->
    <div id="fs-sliders">
      <div class="fs-grp">
        <div class="fs-lbl">Bright</div>
        <div class="vlc-wrap" id="fs-br-wrap" style="width:36px;height:160px;">
          <div class="vlc-track" id="fs-br-track" style="height:140px;width:6px;">
            <div class="vlc-fill" id="fs-br-fill" style="height:100%;"></div>
          </div>
          <div class="vlc-knob" id="fs-br-knob" style="bottom:0;"></div>
        </div>
        <div class="fs-val" id="fs-br-val">100%</div>
      </div>
      <div class="fs-grp">
        <div class="fs-lbl">Volume</div>
        <div class="vlc-wrap" id="fs-vol-wrap" style="width:36px;height:160px;">
          <div class="vlc-track" id="fs-vol-track" style="height:140px;width:6px;">
            <div class="vlc-fill" id="fs-vol-fill" style="height:100%;"></div>
          </div>
          <div class="vlc-knob" id="fs-vol-knob" style="bottom:0;"></div>
        </div>
        <div class="fs-val" id="fs-vol-val">100%</div>
      </div>
    </div>

    <!-- ── BOTTOM CONTROL BAR ── -->
    <div id="ctrl-bar">

      <!-- PROGRESS -->
      <div id="prog-outer">
        <canvas id="wave-canvas"></canvas>
        <div id="prog-tip"></div>
        <div id="prog-track">
          <div id="prog-buf"></div>
          <div id="prog-fill"></div>
          <div id="prog-thumb"></div>
        </div>
      </div>

      <!-- BUTTONS -->
      <div id="btn-row">

        <button class="cbtn" id="play-btn" title="Play / Pause (Space)" onclick="togglePlay()">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor" id="play-icon">
            <polygon points="5,2 17,10 5,18"/>
          </svg>
        </button>

        <button class="cbtn" title="-10s (←)" onclick="doSkip(-10)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="11 17 6 12 11 7"/><polyline points="18 17 13 12 18 7"/>
          </svg>
        </button>

        <button class="cbtn" title="+10s (→)" onclick="doSkip(10)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="13 17 18 12 13 7"/><polyline points="6 17 11 12 6 7"/>
          </svg>
        </button>

        <span id="time-lbl">0:00 / 0:00</span>

        <div class="spacer"></div>

        <!-- VOLUME VLC -->
        <div class="vlc-grp">
          <div class="vlc-lbl">🔊 <span id="vol-num">100</span>%</div>
          <div class="vlc-wrap" id="vol-wrap" style="width:28px;height:52px;">
            <div class="vlc-track" id="vol-track" style="height:40px;width:5px;">
              <div class="vlc-fill" id="vol-fill" style="height:100%;"></div>
            </div>
            <div class="vlc-knob" id="vol-knob" style="bottom:0;"></div>
          </div>
        </div>

        <!-- BRIGHTNESS VLC -->
        <div class="vlc-grp">
          <div class="vlc-lbl">☀ <span id="br-num">100</span>%</div>
          <div class="vlc-wrap" id="br-wrap" style="width:28px;height:52px;">
            <div class="vlc-track" id="br-track" style="height:40px;width:5px;">
              <div class="vlc-fill" id="br-fill" style="height:100%;"></div>
            </div>
            <div class="vlc-knob" id="br-knob" style="bottom:0;"></div>
          </div>
        </div>

        <!-- FULLSCREEN -->
        <button class="cbtn" title="Fullscreen (F)" onclick="doFullscreen()">
          <svg id="fs-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
            <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
          </svg>
        </button>

      </div>
    </div>

  </div><!-- /vid-wrap -->
</div><!-- /player -->

<script>
/* ══════════════════════════════════════════
   CURSOR + TRAIL
══════════════════════════════════════════ */
const cur = document.getElementById('gf-cursor');
const trailWrap = document.getElementById('trail-wrap');
const TRAIL_MAX = 22;
const trailPool = [];
let mx=0,my=0,trailIdx=0;

for(let i=0;i<TRAIL_MAX;i++){
  const d=document.createElement('div');
  d.className='tdot';
  trailWrap.appendChild(d);
  trailPool.push({el:d,x:0,y:0,age:0,maxAge:TRAIL_MAX-i});
}

document.addEventListener('mousemove',e=>{
  mx=e.clientX;my=e.clientY;
  cur.style.left=mx+'px';cur.style.top=my+'px';
  const t=trailPool[trailIdx%TRAIL_MAX];
  t.x=mx;t.y=my;t.age=t.maxAge;
  trailIdx++;
});
document.addEventListener('mousedown',()=>cur.classList.add('clicking'));
document.addEventListener('mouseup',()=>cur.classList.remove('clicking'));

(function animTrail(){
  trailPool.forEach((t,i)=>{
    t.age=Math.max(0,t.age-1);
    const p=t.age/t.maxAge;
    const sz=p*7+1;
    const frac=i/TRAIL_MAX;
    const r=Math.round(frac*0+(1-frac)*0);
    const g=Math.round(frac*240+(1-frac)*80);
    const b=255;
    t.el.style.cssText=`left:${t.x}px;top:${t.y}px;width:${sz}px;height:${sz}px;background:rgba(${r},${g},${b},${p*0.65});`;
  });
  requestAnimationFrame(animTrail);
})();

   INTRO → PLAYER

setTimeout(()=>{

/* ══════════════════════════════════════════
   PLAYER INIT
══════════════════════════════════════════ */
function initPlayer(){

  showCtrls();
}

/* ══════════════════════════════════════════
   VIDEO ELEMENT
══════════════════════════════════════════ */
const vid=document.getElementById('vid-el');
const progFill=document.getElementById('prog-fill');
const progThumb=document.getElementById('prog-thumb');
const progBuf=document.getElementById('prog-buf');
const timeLbl=document.getElementById('time-lbl');
const progOuter=document.getElementById('prog-outer');
const progTrack=document.getElementById('prog-track');
const progTip=document.getElementById('prog-tip');
let seekDrag=false;

vid.addEventListener('timeupdate',onTime);
vid.addEventListener('progress',onBuf);
vid.addEventListener('ended',()=>setPlayIcon(false));
vid.addEventListener('click',togglePlay);

function togglePlay(){
  if(vid.paused){vid.play();setPlayIcon(true);}
  else{vid.pause();setPlayIcon(false);}
  pulse(vid.paused?'▶':'⏸');
  showCtrls();
}

function setPlayIcon(playing){
  document.getElementById('play-icon').innerHTML=playing
    ?'<rect x="5" y="3" width="4" height="16"/><rect x="13" y="3" width="4" height="16"/>'
    :'<polygon points="5,2 17,10 5,18"/>';
}

function pulse(icon){
  const p=document.getElementById('play-pulse');
  p.textContent=icon;
  p.classList.remove('pop');
  void p.offsetWidth;
  p.classList.add('pop');
}

function doSkip(s){
  vid.currentTime=Math.max(0,Math.min(vid.duration||0,vid.currentTime+s));
  const el=document.getElementById(s<0?'skip-back':'skip-fwd');
  el.classList.add('show');
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('show'),700);
  showCtrls();
}

function onTime(){
  if(seekDrag||!vid.duration)return;
  const p=vid.currentTime/vid.duration;
  progFill.style.width=(p*100)+'%';
  progThumb.style.left=(p*100)+'%';
  timeLbl.textContent=fmtT(vid.currentTime)+' / '+fmtT(vid.duration);
}

function onBuf(){
  if(!vid.duration||!vid.buffered.length)return;
  progBuf.style.width=((vid.buffered.end(vid.buffered.length-1)/vid.duration)*100)+'%';
}

function fmtT(s){
  const m=Math.floor(s/60),sec=Math.floor(s%60);
  return m+':'+(sec<10?'0':'')+sec;
}

/* SEEK DRAG */
function getProg(e){
  const r=progTrack.getBoundingClientRect();
  return Math.min(1,Math.max(0,(e.clientX-r.left)/r.width));
}
function applyProg(p){
  progFill.style.width=(p*100)+'%';
  progThumb.style.left=(p*100)+'%';
}

progOuter.addEventListener('mousedown',e=>{
  seekDrag=true;
  applyProg(getProg(e));
});
progOuter.addEventListener('mousemove',e=>{
  const r=progTrack.getBoundingClientRect();
  const p=Math.min(1,Math.max(0,(e.clientX-r.left)/r.width));
  progTip.style.display='block';
  progTip.style.left=(e.clientX-r.left)+'px';
  progTip.textContent=vid.duration?fmtT(p*vid.duration):'';
  if(seekDrag)applyProg(p);
});
progOuter.addEventListener('mouseleave',()=>{progTip.style.display='none';});
document.addEventListener('mouseup',e=>{
  if(!seekDrag)return;
  seekDrag=false;
  if(vid.duration)vid.currentTime=getProg(e)*vid.duration;
});

/* ══════════════════════════════════════════
   MAKE VERTICAL VLC SLIDER
══════════════════════════════════════════ */
function makeVlcSlider(wrapId,trackId,fillId,knobId,valNumId,fsCopyFill,fsCopyKnob,fsCopyVal,cb){
  const wrap=document.getElementById(wrapId);
  const track=document.getElementById(trackId);
  const fill=document.getElementById(fillId);
  const knob=document.getElementById(knobId);
  const valEl=valNumId?document.getElementById(valNumId):null;
  let val=1, drag=false;

  function pct(e){
    const r=track.getBoundingClientRect();
    return Math.min(1,Math.max(0,1-(e.clientY-r.top)/r.height));
  }
  function apply(v,silent){
    val=Math.min(1,Math.max(0,v));
    const pStr=(val*100)+'%';
    const bStr='calc('+(val*100)+'% - 7px)';
    fill.style.height=pStr;
    knob.style.bottom=bStr;
    if(valEl)valEl.textContent=Math.round(val*100);
    /* sync fs copies */
    if(fsCopyFill){
      document.getElementById(fsCopyFill).style.height=pStr;
      document.getElementById(fsCopyKnob).style.bottom=bStr;
      document.getElementById(fsCopyVal).textContent=Math.round(val*100)+'%';
    }
    if(!silent&&cb)cb(val);
  }
  apply(1,true);

  wrap.addEventListener('mousedown',e=>{drag=true;apply(pct(e));e.preventDefault();});
  document.addEventListener('mousemove',e=>{if(drag)apply(pct(e));});
  document.addEventListener('mouseup',()=>{drag=false;});

  return{set:apply,get:()=>val};
}

/* fs sliders also need track refs */
function makeFsVlcSlider(wrapId,trackId,fillId,knobId,valId,mainCb){
  const wrap=document.getElementById(wrapId);
  const track=document.getElementById(trackId);
  const fill=document.getElementById(fillId);
  const knob=document.getElementById(knobId);
  const valEl=document.getElementById(valId);
  let val=1,drag=false;

  function pct(e){
    const r=track.getBoundingClientRect();
    return Math.min(1,Math.max(0,1-(e.clientY-r.top)/r.height));
  }
  function apply(v){
    val=Math.min(1,Math.max(0,v));
    const pStr=(val*100)+'%';
    const bStr='calc('+(val*100)+'% - 7px)';
    fill.style.height=pStr;
    knob.style.bottom=bStr;
    valEl.textContent=Math.round(val*100)+'%';
    mainCb(val);
  }
  apply(1);
  wrap.addEventListener('mousedown',e=>{drag=true;apply(pct(e));e.preventDefault();});
  document.addEventListener('mousemove',e=>{if(drag)apply(pct(e));});
  document.addEventListener('mouseup',()=>{drag=false;});
  return{set:apply,get:()=>val};
}

/* ── VOLUME slider ── */
const volSlider=makeVlcSlider(
  'vol-wrap','vol-track','vol-fill','vol-knob','vol-num',
  'fs-vol-fill','fs-vol-knob','fs-vol-val',
  v=>{vid.volume=v;}
);
/* ── BRIGHTNESS slider ── */
const brSlider=makeVlcSlider(
  'br-wrap','br-track','br-fill','br-knob','br-num',
  'fs-br-fill','fs-br-knob','fs-br-val',
  v=>{document.getElementById('bright-overlay').style.opacity=1-v;}
);

/* ── FS VOLUME ── */
const fsVolSlider=makeFsVlcSlider(
  'fs-vol-wrap','fs-vol-track','fs-vol-fill','fs-vol-knob','fs-vol-val',
  v=>{
    vid.volume=v;
    volSlider.set(v);
    document.getElementById('vol-num').textContent=Math.round(v*100);
  }
);
/* ── FS BRIGHTNESS ── */
const fsBrSlider=makeFsVlcSlider(
  'fs-br-wrap','fs-br-track','fs-br-fill','fs-br-knob','fs-br-val',
  v=>{
    document.getElementById('bright-overlay').style.opacity=1-v;
    brSlider.set(v);
    document.getElementById('br-num').textContent=Math.round(v*100);
  }
);

/* ══════════════════════════════════════════
   FULLSCREEN
══════════════════════════════════════════ */
function doFullscreen(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}
document.addEventListener('fullscreenchange',()=>{
  const fss=document.getElementById('fs-sliders');
  const icon=document.getElementById('fs-icon');
  if(document.fullscreenElement){
    fss.classList.add('on');
    icon.innerHTML='<polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="21" y2="3"/><line x1="3" y1="21" x2="14" y2="10"/>';
  } else {
    fss.classList.remove('on');
    icon.innerHTML='<polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>';
  }
});

/* ══════════════════════════════════════════
   AUTO-HIDE CONTROLS
══════════════════════════════════════════ */
let hideT;
const ctrlBar=document.getElementById('ctrl-bar');
const topBar=document.getElementById('top-bar');
const fsSliders=document.getElementById('fs-sliders');

function showCtrls(){
  ctrlBar.classList.remove('hide');
  topBar.classList.remove('hide');
  if(document.fullscreenElement)fsSliders.classList.remove('hide');
  clearTimeout(hideT);
  hideT=setTimeout(()=>{
    if(!vid.paused){
      ctrlBar.classList.add('hide');
      topBar.classList.add('hide');
      if(document.fullscreenElement)fsSliders.classList.add('hide');
    }
  },3200);
}

document.getElementById('vid-wrap').addEventListener('mousemove',showCtrls);
document.getElementById('vid-wrap').addEventListener('touchstart',showCtrls);

/* ══════════════════════════════════════════
   PANELS (audio / subtitle)
══════════════════════════════════════════ */
function togglePanel(id,btn){
  const p=document.getElementById(id);
  const wasOpen=p.classList.contains('open');
  document.querySelectorAll('.ppanel').forEach(x=>x.classList.remove('open'));
  if(!wasOpen)p.classList.add('open');
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.ppanel')&&!e.target.closest('.tpbtn'))
    document.querySelectorAll('.ppanel').forEach(x=>x.classList.remove('open'));
});

function pickAudio(el,name){
  document.querySelectorAll('#aud-panel .pp-item').forEach(i=>i.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('aud-lbl').textContent=name;
  document.getElementById('aud-panel').classList.remove('open');
}
function pickSub(el,name,src){
  document.querySelectorAll('#sub-panel .pp-item').forEach(i=>i.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('sub-lbl').textContent=name;
  document.getElementById('sub-panel').classList.remove('open');
  const t=document.getElementById('sub-track');
  if(src){t.src=src;t.track.mode='showing';}
  else t.track.mode='disabled';
}

/* ══════════════════════════════════════════
   WAVEFORM / MOUNTAIN
══════════════════════════════════════════ */
function drawWave(){
  const c=document.getElementById('wave-canvas');
  if(!c)return;
  const dpr=window.devicePixelRatio||1;
  c.width=c.offsetWidth*dpr;
  c.height=30*dpr;
  const ctx=c.getContext('2d');
  ctx.scale(dpr,dpr);
  const W=c.offsetWidth,H=30;
  ctx.clearRect(0,0,W,H);

  const N=200;
  const pts=[];
  /* seed random for consistent shape */
  let seed=42;
  function rnd(){seed=(seed*1664525+1013904223)&0xffffffff;return(seed>>>0)/0xffffffff;}

  for(let i=0;i<=N;i++){
    const t=i/N;
    const mountain=Math.sin(t*Math.PI)*18;
    const ridges=
      Math.sin(t*Math.PI*6)*3.5+
      Math.sin(t*Math.PI*13)*1.8+
      Math.sin(t*Math.PI*29)*0.9+
      (rnd()-0.5)*2.5;
    pts.push({x:t*W, y:H-(mountain+Math.max(0,ridges))});
  }

  ctx.beginPath();
  ctx.moveTo(0,H);
  ctx.lineTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++){
    const px=pts[i-1],px2=pts[i];
    const cx=(px.x+px2.x)/2;
    ctx.bezierCurveTo(cx,px.y,cx,px2.y,px2.x,px2.y);
  }
  ctx.lineTo(W,H);
  ctx.closePath();

  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'rgba(0,240,255,.7)');
  g.addColorStop(0.5,'rgba(112,0,255,.5)');
  g.addColorStop(1,'rgba(112,0,255,.05)');
  ctx.fillStyle=g;
  ctx.fill();
}
window.addEventListener('resize',drawWave);

/* ══════════════════════════════════════════
   KEYBOARD SHORTCUTS
══════════════════════════════════════════ */
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  switch(e.code){
    case'Space':e.preventDefault();togglePlay();break;
    case'ArrowRight':doSkip(10);break;
    case'ArrowLeft':doSkip(-10);break;
    case'ArrowUp':{
      e.preventDefault();
      const v=Math.min(1,volSlider.get()+0.05);
      volSlider.set(v);fsVolSlider.set(v);
    }break;
    case'ArrowDown':{
      e.preventDefault();
      const v=Math.max(0,volSlider.get()-0.05);
      volSlider.set(v);fsVolSlider.set(v);
    }break;
    case'KeyF':doFullscreen();break;
    case'KeyM':
      vid.muted=!vid.muted;
      volSlider.set(vid.muted?0:1);
      break;
  }
  showCtrls();
});

/* double-click fullscreen */
document.getElementById('vid-el').addEventListener('dblclick',doFullscreen);
</script>
